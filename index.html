<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pet Vaccination Checker</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>
    
    <style>
        :root {
            --primary: #4CAF50;
            --secondary: #2196F3;
            --warning: #ff9800;
            --dark: #333;
            --light: #f4f4f9;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--light);
            color: var(--dark);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 100%;
            text-align: center;
        }
        h2 { margin-top: 0; color: var(--dark); }
        p.instructions {
            font-size: 13px;
            color: #666;
            margin-bottom: 20px;
        }
        .upload-area {
            border: 2px dashed #ccc;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            cursor: pointer;
            position: relative;
            background-color: #fafafa;
            transition: background-color 0.2s;
        }
        .upload-area:hover {
            background-color: #f0f0f0;
        }
        .upload-area input {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0; cursor: pointer;
        }
        img#preview {
            max-width: 100%;
            border-radius: 8px;
            display: none;
            margin-top: 10px;
        }
        button {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        button:hover { opacity: 0.9; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        
        .btn-search { background-color: var(--secondary); }
        .btn-vaccinate { background-color: var(--primary); display: none; }
        .btn-register { background-color: var(--warning); display: none; }
        
        .status-box {
            margin-top: 20px;
            padding: 15px;
            border-radius: 6px;
            font-weight: bold;
            display: none;
            word-wrap: break-word;
        }
        .loading { 
            font-size: 14px; 
            color: #666; 
            margin-top: 10px; 
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Vaccination Portal</h2>
    <p class="instructions">For best results, upload a clear, close-up photo of the dog's face in good lighting.</p>
    
    <div class="upload-area">
        <span id="uploadText">Tap to Upload Dog Photo</span>
        <input type="file" id="photoInput" accept="image/*">
        <img id="preview" alt="Dog Preview">
    </div>

    <div id="loader" class="loading">Loading AI Model... Please wait.</div>

    <button id="btnSearch" class="btn-search" disabled>Search Database</button>
    <button id="btnVaccinate" class="btn-vaccinate">Vaccinate Recognized Pet</button>
    <button id="btnRegister" class="btn-register">Register as NEW & Vaccinate</button>

    <div id="statusOutput" class="status-box"></div>
</div>

<script>
    // ==========================================
    // 1. CONFIGURATION
    // ==========================================
    // IMPORTANT: Replace this string with your deployed Google Apps Script Web App URL
    const APP_URL = "https://script.google.com/macros/s/AKfycbxYi4ruQ9zpJxr5U2ZsXDdg77ybsQoiT3XzB6dfRKILuuADxboZMSQCJrBC7G8y7RFjmA/exec"; 
    
    let model = null;
    let petsData = [];
    let currentMatch = null;
    let compressedImageBase64 = null;

    // DOM Elements
    const preview = document.getElementById('preview');
    const uploadText = document.getElementById('uploadText');
    const btnSearch = document.getElementById('btnSearch');
    const btnVaccinate = document.getElementById('btnVaccinate');
    const btnRegister = document.getElementById('btnRegister');
    const statusOutput = document.getElementById('statusOutput');
    const loader = document.getElementById('loader');

    // ==========================================
    // 2. INITIALIZATION
    // ==========================================
    async function init() {
        try {
            // Load MobileNet model
            model = await mobilenet.load({version: 2, alpha: 1.0});
            
            // Fetch registry data from Google Sheets
            loader.innerText = "Fetching Registry Data...";
            const response = await fetch(APP_URL);
            petsData = await response.json();
            
            loader.style.display = 'none';
        } catch (error) {
            loader.innerText = "Initialization Error. Check console.";
            console.error(error);
        }
    }

    // ==========================================
    // 3. IMAGE PROCESSING (Resizing for Google Sheets)
    // ==========================================
    function resizeImage(file) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    // Max width of 400px to prevent Apps Script memory crashes
                    const MAX_WIDTH = 400; 
                    const scaleSize = MAX_WIDTH / img.width;
                    canvas.width = MAX_WIDTH;
                    canvas.height = img.height * scaleSize;
                    
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    
                    // Compress to JPEG with 0.8 quality
                    resolve(canvas.toDataURL('image/jpeg', 0.8));
                }
                img.src = e.target.result;
            }
            reader.readAsDataURL(file);
        });
    }

    // Handle File Upload
    document.getElementById('photoInput').addEventListener('change', async function(e) {
        const file = e.target.files[0];
        if (file) {
            loader.style.display = 'block';
            loader.innerText = "Processing image...";
            
            // Resize and compress the image
            compressedImageBase64 = await resizeImage(file);
            
            // Update UI
            preview.src = compressedImageBase64;
            preview.style.display = 'block';
            uploadText.style.display = 'none';
            
            // Reset buttons and status
            btnSearch.disabled = false;
            btnSearch.style.display = 'block';
            btnVaccinate.style.display = 'none';
            btnRegister.style.display = 'none';
            statusOutput.style.display = 'none';
            loader.style.display = 'none';
        }
    });

    // Helper to display status messages
    function showStatus(message, type) {
        statusOutput.style.display = 'block';
        if(type === 'success') {
            statusOutput.style.backgroundColor = '#e8f5e9';
            statusOutput.style.color = '#2e7d32';
        } else if (type === 'warning') {
            statusOutput.style.backgroundColor = '#fff3e0';
            statusOutput.style.color = '#e65100';
        } else {
            statusOutput.style.backgroundColor = '#ffebee';
            statusOutput.style.color = '#c62828';
        }
        statusOutput.innerText = message;
    }

    // ==========================================
    // 4. AI COMPARISON LOGIC
    // ==========================================
    function cosineSimilarity(tensorA, tensorB) {
        const a = tensorA.dataSync();
        const b = tensorB.dataSync();
        let dotProduct = 0, normA = 0, normB = 0;
        for (let i = 0; i < a.length; i++) {
            dotProduct += a[i] * b[i];
            normA += a[i] * a[i];
            normB += b[i] * b[i];
        }
        return dotProduct / (Math.sqrt(normA) * Math.sqrt(normB));
    }

    async function findMatchingDog() {
        loader.style.display = 'block';
        loader.innerText = "Analyzing image similarity...";
        
        try {
            // Extract features from the uploaded image
            const uploadedFeatures = model.infer(preview, true);
            let bestMatch = null;
            let highestScore = -1;

            // Loop through the database to find a match
            for (let pet of petsData) {
                if (!pet.PetPhoto) continue;
                
                try {
                    const tempImg = new Image();
                    tempImg.crossOrigin = "Anonymous";
                    await new Promise((resolve, reject) => {
                        tempImg.onload = resolve;
                        tempImg.onerror = reject;
                        tempImg.src = pet.PetPhoto;
                    });
                    
                    const dbFeatures = model.infer(tempImg, true);
                    const similarity = cosineSimilarity(uploadedFeatures, dbFeatures);
                    
                    if (similarity > highestScore) {
                        highestScore = similarity;
                        bestMatch = pet;
                    }
                } catch (imgErr) {
                    console.warn("Could not process image for pet:", pet.PUID, imgErr);
                }
            }
            
            loader.style.display = 'none';
            
            // Threshold is set to 0.70. Adjust this based on real-world testing.
            if (highestScore > 0.70 && bestMatch) {
                return bestMatch;
            } else {
                return null;
            }
        } catch (e) {
            loader.style.display = 'none';
            console.error("Analysis error:", e);
            return null;
        }
    }

    // ==========================================
    // 5. BUTTON ACTIONS
    // ==========================================
    
    // Search Button
    btnSearch.addEventListener('click', async () => {
        currentMatch = await findMatchingDog();
        btnSearch.style.display = 'none';

        if (currentMatch) {
            btnVaccinate.style.display = 'block';
            const isVaccinated = currentMatch.ForVaccinated === "ForVaccinated";
            showStatus(`Match Found: ${currentMatch.PUID}. Status: ${isVaccinated ? 'VACCINATED ✅' : 'NOT VACCINATED ❌'}`, isVaccinated ? 'success' : 'error');
        } else {
            btnRegister.style.display = 'block';
            showStatus("No matching dog found. Would you like to register this as a new dog?", "warning");
        }
    });

    // Vaccinate Existing Dog Button
    btnVaccinate.addEventListener('click', async () => {
        if (currentMatch.ForVaccinated === "ForVaccinated") {
            showStatus(`${currentMatch.PUID} is already vaccinated!`, 'success');
            return;
        }
        
        loader.style.display = 'block';
        loader.innerText = `Updating vaccination...`;

        const formData = new URLSearchParams();
        formData.append('action', 'vaccinate_pet');
        formData.append('PUID', currentMatch.PUID);

        try {
            await fetch(APP_URL, { 
                method: 'POST', 
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: formData 
            });
            loader.style.display = 'none';
            showStatus(`${currentMatch.PUID} marked as Vaccinated!`, 'success');
            init(); // Refresh data to reflect the change
        } catch (e) {
            loader.style.display = 'none';
            showStatus("Failed to update Google Sheet.", 'error');
        }
    });

    // Register New Dog Button
    btnRegister.addEventListener('click', async () => {
        loader.style.display = 'block';
        loader.innerText = `Registering and uploading photo...`;

        // Generate a new unique PUID based on timestamp
        const newPUID = "DOG-" + Date.now().toString().slice(-6);

        const formData = new URLSearchParams();
        formData.append('action', 'register_new');
        formData.append('PUID', newPUID);
        formData.append('PhotoData', compressedImageBase64);
        formData.append('ForVaccinated', 'ForVaccinated');

        try {
            await fetch(APP_URL, { 
                method: 'POST', 
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: formData 
            });
            
            loader.style.display = 'none';
            showStatus(`New Dog Registered & Vaccinated! (ID: ${newPUID})`, 'success');
            btnRegister.style.display = 'none';
            init(); // Refresh data to include the new dog
        } catch (e) {
            loader.style.display = 'none';
            showStatus("Failed to register new dog in Google Sheet.", 'error');
        }
    });

    // Start initialization on window load
    window.onload = init;
</script>
</body>
</html>
