<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pearl Vets | AI Visual Verification</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>
    <style>
        :root { --brand: #27C3EA; --dark: #1a2a3a; --bg: #f8fafc; }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--dark); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { background: white; width: 100%; max-width: 480px; padding: 24px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .header { text-align: center; margin-bottom: 24px; }
        .header h1 { color: var(--brand); margin: 0; font-size: 24px; }
        
        .camera-box { width: 100%; height: 280px; background: #eee; border-radius: 15px; overflow: hidden; position: relative; border: 2px solid #e2e8f0; }
        #preview { width: 100%; height: 100%; object-fit: cover; }
        
        .btn { display: block; width: 100%; padding: 16px; background: var(--brand); color: white; border: none; border-radius: 12px; font-weight: 700; font-size: 16px; cursor: pointer; transition: 0.2s; margin-top: 15px; }
        .btn:disabled { background: #cbd5e1; cursor: not-allowed; }
        .btn-secondary { background: var(--dark); }

        #results { margin-top: 20px; padding: 15px; border-radius: 12px; display: none; border: 1px solid #e2e8f0; }
        .match-badge { background: #def7ec; color: #03543f; padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        
        .loader { width: 20px; height: 20px; border: 3px solid #FFF; border-bottom-color: transparent; border-radius: 50%; display: inline-block; animation: rotation 1s linear infinite; margin-right: 10px; }
        @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Pearl Vets</h1>
        <p>Dog Face Verification System</p>
    </div>

    <div class="camera-box">
        <video id="webcam" autoplay playsinline style="width:100%; height:100%; object-fit:cover;"></video>
        <img id="preview" style="display:none;">
    </div>

    <button id="scanBtn" class="btn" onclick="identifyDog()">
        <span id="btnText">Scan Dog Face</span>
    </button>

    <div id="results">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h3 id="petName" style="margin:0;">Searching...</h3>
            <span class="match-badge" id="matchScore">0% Match</span>
        </div>
        <p id="petDetails" style="font-size:14px; color:#64748b; margin:10px 0;"></p>
        <div id="vaxStatus" style="font-weight:bold; font-size:14px;"></div>
    </div>
</div>

<script>
    const SCRIPT_URL = 'YOUR_APPS_SCRIPT_URL'; // Replace with your Web App URL
    let model;
    let video = document.getElementById('webcam');
    let btn = document.getElementById('scanBtn');

    // Initialize Camera and AI Model
    async function init() {
        try {
            updateUI("Loading AI Model...", true);
            model = await mobilenet.load();
            
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            video.srcObject = stream;
            
            updateUI("Ready to Scan", false);
        } catch (e) {
            alert("Camera access required for verification.");
        }
    }

    async function identifyDog() {
        updateUI("Scanning Features...", true);
        
        try {
            // 1. Get embedding (fingerprint) of the current dog
            const activation = await model.infer(video, true);
            
            // 2. Fetch Registry Data from your Spreadsheet
            const response = await fetch(SCRIPT_URL);
            const registry = await response.json();
            
            let bestMatch = null;
            let highestSimilarity = 0;

            // 3. Compare with every pet in the registry
            // This happens on the device for privacy and speed
            for (let pet of registry) {
                if (!pet.PetPhoto) continue;

                // Create a temporary image to analyze the registry photo
                const sim = await comparePhotos(video, pet.PetPhoto);
                
                if (sim > highestSimilarity) {
                    highestSimilarity = sim;
                    bestMatch = pet;
                }
            }

            displayResult(bestMatch, highestSimilarity);
        } catch (e) {
            console.error(e);
            updateUI("Scan Failed", false);
        }
    }

    async function comparePhotos(liveVideo, registryUrl) {
        return new Promise((resolve) => {
            const img = new Image();
            img.crossOrigin = "anonymous";
            img.src = registryUrl;
            img.onload = async () => {
                const liveFeatures = await model.infer(liveVideo, true);
                const registryFeatures = await model.infer(img, true);
                
                // Calculate Cosine Similarity
                const dist = tf.losses.cosineDistance(liveFeatures, registryFeatures).dataSync();
                // Convert distance to percentage (lower distance = higher similarity)
                resolve(1 - dist[0]); 
            };
            img.onerror = () => resolve(0);
        });
    }

    function displayResult(pet, score) {
        const resultsDiv = document.getElementById('results');
        const scorePct = Math.round(score * 100);
        
        resultsDiv.style.display = 'block';
        updateUI("Scan Again", false);

        if (score > 0.75) { // Threshold for a "match"
            document.getElementById('petName').innerText = pet.PetName;
            document.getElementById('matchScore').innerText = scorePct + "% Match";
            document.getElementById('petDetails').innerText = `Owner: ${pet.OwnerFirstName} | Microchip: ${pet.Microchip}`;
            
            // Verification check based on Column N (ForVaccinated)
            const isVax = (pet.ForVaccinated && pet.ForVaccinated !== "");
            document.getElementById('vaxStatus').innerHTML = isVax 
                ? "<span style='color:#16a34a;'>✅ VACCINATION VERIFIED</span>" 
                : "<span style='color:#dc2626;'>❌ NO VACCINATION RECORD</span>";
        } else {
            document.getElementById('petName').innerText = "No Match Found";
            document.getElementById('petDetails').innerText = "This pet is not in our verified registry.";
            document.getElementById('matchScore').innerText = "N/A";
            document.getElementById('vaxStatus').innerText = "";
        }
    }

    function updateUI(text, loading) {
        const btnText = document.getElementById('btnText');
        btnText.innerHTML = loading ? `<span class="loader"></span> ${text}` : text;
        btn.disabled = loading;
    }

    init();
</script>
</body>
</html>
