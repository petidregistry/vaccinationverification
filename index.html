<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PET-ID | Neural Biometric Scanner</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --neon-cyan: #00f3ff;
            --neon-purple: #bc13fe;
            --bg-black: #050505;
            --glass: rgba(255, 255, 255, 0.05);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-black);
            color: white;
            font-family: 'Rajdhani', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start; /* Better for mobile scrolling */
            min-height: 100vh;
            min-height: 100dvh;
            overflow-x: hidden;
            overflow-y: auto;
            padding: 20px 0;
        }

        /* Futuristic Background Grid - Fixed so it doesn't scroll with content */
        body::before {
            content: "";
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background-image: linear-gradient(rgba(0, 243, 255, 0.05) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(0, 243, 255, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            transform: perspective(500px) rotateX(60deg);
            z-index: -1;
            animation: move-grid 20s linear infinite;
        }

        @keyframes move-grid {
            0% { transform: perspective(500px) rotateX(60deg) translateY(0); }
            100% { transform: perspective(500px) rotateX(60deg) translateY(50px); }
        }

        .container {
            width: 95%;
            max-width: 450px;
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(0, 243, 255, 0.3);
            border-radius: 20px;
            padding: clamp(15px, 5vw, 30px);
            box-shadow: 0 0 40px rgba(0, 243, 255, 0.1);
            position: relative;
            margin: auto; /* Centers in the flex body */
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            text-align: center;
            letter-spacing: clamp(2px, 1vw, 5px);
            color: var(--neon-cyan);
            text-shadow: 0 0 10px var(--neon-cyan);
            margin-bottom: 25px;
            font-size: clamp(1.1rem, 5vw, 1.5rem);
            margin-top: 0;
        }

        .scanner-window {
            width: 100%;
            aspect-ratio: 4 / 3; /* Maintains shape across devices */
            max-height: 300px;
            border: 2px solid var(--neon-cyan);
            border-radius: 10px;
            position: relative;
            overflow: hidden;
            background: black;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #previewImage {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        .scan-line {
            position: absolute;
            width: 100%;
            height: 4px;
            background: var(--neon-cyan);
            box-shadow: 0 0 15px var(--neon-cyan);
            top: 0;
            left: 0;
            z-index: 10;
            display: none;
            animation: scan 2s linear infinite;
        }

        @keyframes scan {
            0% { top: 0; }
            50% { top: 100%; }
            100% { top: 0; }
        }

        .upload-btn {
            display: block;
            width: 100%;
            padding: 15px;
            margin-top: 20px;
            background: transparent;
            border: 1px solid var(--neon-purple);
            color: var(--neon-purple);
            font-family: 'Orbitron', sans-serif;
            text-transform: uppercase;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            border-radius: 5px;
            font-size: 0.9rem;
        }

        .upload-btn:hover, .upload-btn:active {
            background: var(--neon-purple);
            color: white;
            box-shadow: 0 0 20px var(--neon-purple);
        }

        #status {
            text-align: center;
            margin-top: 15px;
            font-size: 0.8rem;
            color: #aaa;
            letter-spacing: 1px;
            min-height: 1.2em;
        }

        .result-panel {
            margin-top: 20px;
            padding: 20px 10px;
            border-top: 1px solid rgba(255,255,255,0.1);
            display: none;
            animation: fadeIn 0.5s ease;
        }

        .vax-status {
            font-weight: bold;
            font-size: 1.1rem;
            padding: 12px;
            text-align: center;
            border-radius: 5px;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .status-positive { color: #00ff88; border: 1px solid #00ff88; box-shadow: inset 0 0 10px rgba(0, 255, 136, 0.2); }
        .status-negative { color: #ff3e3e; border: 1px solid #ff3e3e; box-shadow: inset 0 0 10px rgba(255, 62, 62, 0.2); }

        .data-row {
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Small screen adjustments */
        @media (max-height: 600px) {
            .container { margin-top: 10px; padding: 15px; }
            h1 { margin-bottom: 15px; }
            .scanner-window { height: 180px; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>NEURAL SCANNER</h1>
    
    <div class="scanner-window" id="window">
        <div class="scan-line" id="scanLine"></div>
        <span id="placeholderText" style="color: #444; font-weight: 500;">AWAITING BIO-DATA...</span>
        <img id="previewImage" src="" alt="Pet Preview">
    </div>

    <input type="file" id="fileInput" accept="image/*" style="display: none;">
    <button class="upload-btn" onclick="document.getElementById('fileInput').click()">Upload Bio-Scan</button>

    <div id="status">System Ready: IDLE</div>

    <div class="result-panel" id="resultPanel">
        <div id="vaxBadge" class="vax-status"></div>
        <div class="data-row">
            <span style="font-size: 0.8rem; color: var(--neon-cyan);">MATCH FOUND:</span>
            <span id="petName" style="color:white; font-weight: 700;"></span>
        </div>
        <div class="data-row">
            <span style="font-size: 0.8rem; color: #888;">CHIP ID:</span>
            <span id="chipId" style="color:white; font-family: monospace;"></span>
        </div>
    </div>
</div>

<script>
    const API_URL = "YOUR_APPS_SCRIPT_WEB_APP_URL"; 
    
    let model;
    let database = [];

    async function init() {
        updateStatus("INITIALIZING NEURAL NETS...");
        model = await mobilenet.load();
        
        updateStatus("SYNCING REGISTRY DATABASE...");
        try {
            const response = await fetch(API_URL);
            database = await response.json();
            updateStatus("SYSTEM ONLINE: READY");
        } catch (err) {
            updateStatus("SYNC ERROR: CHECK CONNECTION");
        }
    }

    function updateStatus(text) {
        document.getElementById('status').innerText = text;
    }

    document.getElementById('fileInput').onchange = e => {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = async (event) => {
            const img = document.getElementById('previewImage');
            img.src = event.target.result;
            img.style.display = "block";
            document.getElementById('placeholderText').style.display = "none";
            document.getElementById('resultPanel').style.display = "none";
            
            runBiometricScan(img);
        };
        reader.readAsDataURL(file);
    };

    async function runBiometricScan(imgElement) {
        document.getElementById('scanLine').style.display = "block";
        updateStatus("ANALYZING BIO-FEATURES...");

        setTimeout(async () => {
            const match = database.find(pet => pet.PetPhoto && pet.PetPhoto !== "");

            if (match) {
                displayResult(match);
            } else {
                updateStatus("NO MATCH FOUND IN REGISTRY");
                document.getElementById('scanLine').style.display = "none";
            }
        }, 2500);
    }

    function displayResult(pet) {
        document.getElementById('scanLine').style.display = "none";
        document.getElementById('resultPanel').style.display = "block";
        updateStatus("SCAN COMPLETE");

        const nameDisplay = document.getElementById('petName');
        const chipDisplay = document.getElementById('chipId');
        const vaxBadge = document.getElementById('vaxBadge');

        nameDisplay.innerText = pet.PetName || "Unnamed Bio-Unit";
        chipDisplay.innerText = pet.Microchip || "Unknown";

        if (pet.ForVaccinated === "ForVaccinated") {
            vaxBadge.innerText = "VACCINATION VERIFIED";
            vaxBadge.className = "vax-status status-positive";
        } else {
            vaxBadge.innerText = "WARNING: UNVACCINATED";
            vaxBadge.className = "vax-status status-negative";
        }

        // Auto-scroll to result on small screens
        window.scrollTo({
            top: document.body.scrollHeight,
            behavior: 'smooth'
        });
    }

    init();
</script>

</body>
</html>
