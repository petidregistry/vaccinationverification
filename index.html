<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bio-Data Pet Scanner</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #050a0f;
            --primary-color: #00ffcc;
            --alert-color: #ff3366;
            --panel-bg: rgba(0, 255, 204, 0.05);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--primary-color);
            font-family: 'Share Tech Mono', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Sci-Fi Grid Background */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: 
                linear-gradient(rgba(0, 255, 204, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 204, 0.1) 1px, transparent 1px);
            background-size: 30px 30px;
            z-index: -1;
            opacity: 0.3;
        }

        .hud-container {
            border: 2px solid var(--primary-color);
            background: var(--panel-bg);
            padding: 20px;
            width: 90%;
            max-width: 600px;
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.2), inset 0 0 20px rgba(0, 255, 204, 0.1);
            position: relative;
        }

        /* HUD Corners */
        .hud-container::before, .hud-container::after {
            content: ''; position: absolute; width: 20px; height: 20px; border: 3px solid var(--primary-color);
        }
        .hud-container::before { top: -2px; left: -2px; border-right: none; border-bottom: none; }
        .hud-container::after { bottom: -2px; right: -2px; border-left: none; border-top: none; }

        h1 {
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-top: 0;
            border-bottom: 1px solid var(--primary-color);
            padding-bottom: 10px;
        }

        .scanner-window {
            width: 100%;
            height: 350px;
            border: 1px dashed var(--primary-color);
            margin: 20px 0;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            overflow: hidden;
        }

        #preview-img {
            max-width: 100%;
            max-height: 100%;
            display: none;
            z-index: 1;
        }

        .scan-line {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 5px;
            background: var(--primary-color);
            box-shadow: 0 0 15px var(--primary-color);
            opacity: 0.7;
            z-index: 2;
            display: none;
            animation: scanAnim 2s linear infinite;
        }

        @keyframes scanAnim {
            0% { top: 0; }
            50% { top: 100%; }
            100% { top: 0; }
        }

        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        button, .file-upload-label {
            background: transparent;
            color: var(--primary-color);
            border: 1px solid var(--primary-color);
            padding: 10px 20px;
            cursor: pointer;
            font-family: inherit;
            text-transform: uppercase;
            font-size: 16px;
            transition: all 0.3s;
        }

        button:hover, .file-upload-label:hover {
            background: var(--primary-color);
            color: #000;
            box-shadow: 0 0 15px var(--primary-color);
        }

        input[type="file"] {
            display: none;
        }

        .status-panel {
            margin-top: 20px;
            padding: 15px;
            border: 1px solid rgba(0, 255, 204, 0.3);
            background: rgba(0, 0, 0, 0.5);
        }

        .log-entry { margin: 5px 0; font-size: 14px; }
        
        .match-result {
            margin-top: 15px;
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            text-shadow: 0 0 10px currentColor;
        }

        .vaccinated { color: var(--primary-color); border: 2px solid var(--primary-color); padding: 10px; background: rgba(0, 255, 204, 0.1); }
        .unidentified { color: var(--alert-color); border: 2px solid var(--alert-color); padding: 10px; background: rgba(255, 51, 102, 0.1); }

    </style>
</head>
<body>

    <div class="hud-container">
        <h1>[ Bio-Data Pet Scanner ]</h1>
        
        <div class="scanner-window">
            <span id="standby-text">SYSTEM STANDBY... AWAITING BIO-INPUT</span>
            <img id="preview-img" alt="Subject Preview">
            <div class="scan-line" id="scan-line"></div>
        </div>

        <div class="controls">
            <label class="file-upload-label">
                <input type="file" id="image-upload" accept="image/*">
                [ INIT_UPLOAD ]
            </label>
            <button id="scan-btn" disabled>[ EXECUTE_SCAN ]</button>
        </div>

        <div class="status-panel">
            <div id="system-logs">
                <div class="log-entry">> SYSTEM INITIALIZING...</div>
            </div>
            <div id="final-result"></div>
        </div>
    </div>

    <script>
        // --- CONFIGURATION ---
        // REPLACE THIS WITH YOUR APPS SCRIPT WEB APP URL
        const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxYi4ruQ9zpJxr5U2ZsXDdg77ybsQoiT3XzB6dfRKILuuADxboZMSQCJrBC7G8y7RFjmA/exec"; 
        
        // Internal variables
        let net = null;
        let dbRecords = [];
        let uploadedImageElement = document.getElementById('preview-img');
        const scanBtn = document.getElementById('scan-btn');
        const fileInput = document.getElementById('image-upload');
        const logsBox = document.getElementById('system-logs');
        const resultBox = document.getElementById('final-result');
        const scanLine = document.getElementById('scan-line');

        // Helper: Add text to the sci-fi terminal log
        function logMsg(msg) {
            const el = document.createElement('div');
            el.className = 'log-entry';
            el.innerText = `> ${msg}`;
            logsBox.appendChild(el);
            logsBox.scrollTop = logsBox.scrollHeight;
        }

        // --- SYSTEM BOOT SEQUENCE ---
        async function initSystem() {
            try {
                logMsg("LOADING NEURAL NETWORK (MOBILENET V2)...");
                // Load MobileNet for feature extraction
                net = await mobilenet.load({ version: 2, alpha: 1.0 });
                logMsg("NEURAL NET: ONLINE.");

                if (APPS_SCRIPT_URL !== "YOUR_APPS_SCRIPT_WEB_APP_URL_HERE") {
                    logMsg("ESTABLISHING UPLINK TO REGISTRY...");
                    const response = await fetch(APPS_SCRIPT_URL);
                    dbRecords = await response.json();
                    logMsg(`UPLINK SUCCESS: ${dbRecords.length} SUBJECTS FOUND.`);
                } else {
                    logMsg("WARNING: NO REGISTRY UPLINK PROVIDED. ENTER APPS SCRIPT URL.");
                }
            } catch (error) {
                logMsg(`ERROR: ${error.message}`);
            }
        }

        // --- IMAGE UPLOAD HANDLER ---
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    document.getElementById('standby-text').style.display = 'none';
                    uploadedImageElement.src = event.target.result;
                    uploadedImageElement.style.display = 'block';
                    scanBtn.disabled = false;
                    resultBox.innerHTML = ""; // Clear previous results
                    logMsg("NEW BIO-DATA LOADED. READY FOR SCAN.");
                };
                reader.readAsDataURL(file);
            }
        });

        // --- COSINE SIMILARITY MATH (To compare neural embeddings) ---
        function calculateSimilarity(embedding1, embedding2) {
            let dotProduct = 0;
            let normA = 0;
            let normB = 0;
            for (let i = 0; i < embedding1.length; i++) {
                dotProduct += embedding1[i] * embedding2[i];
                normA += embedding1[i] * embedding1[i];
                normB += embedding2[i] * embedding2[i];
            }
            return dotProduct / (Math.sqrt(normA) * Math.sqrt(normB));
        }

        // --- MAIN SCAN EXECUTION ---
        scanBtn.addEventListener('click', async () => {
            if (!net || dbRecords.length === 0) {
                logMsg("ABORT: SYSTEM OFFLINE OR DATABASE EMPTY.");
                return;
            }

            scanBtn.disabled = true;
            scanLine.style.display = 'block';
            logMsg("EXTRACTING SUBJECT FEATURES...");

            try {
                // 1. Get embedding for the uploaded image
                // infer() bypasses classification and returns the mathematical tensor features
                const uploadTensor = net.infer(uploadedImageElement, true);
                const uploadEmbedding = await uploadTensor.data();

                let bestMatchScore = 0;
                let matchedPetName = null;

                logMsg("CROSS-REFERENCING DATABASE...");

                // 2. Loop through DB and compare
                for (let i = 0; i < dbRecords.length; i++) {
                    const record = dbRecords[i];
                    if (record.PetPhoto) {
                        try {
                            // Load the DB image
                            let dbImg = new Image();
                            dbImg.crossOrigin = "anonymous"; // Important for external images (Drive)
                            dbImg.src = record.PetPhoto;
                            
                            await new Promise((resolve, reject) => {
                                dbImg.onload = resolve;
                                dbImg.onerror = reject;
                            });

                            // Extract DB image features and compare
                            const dbTensor = net.infer(dbImg, true);
                            const dbEmbedding = await dbTensor.data();
                            
                            const score = calculateSimilarity(uploadEmbedding, dbEmbedding);
                            
                            // If it's the highest score so far, record it
                            if (score > bestMatchScore) {
                                bestMatchScore = score;
                                matchedPetName = record.PetName || "UNKNOWN_SUBJECT";
                            }
                            
                            // Free memory
                            dbTensor.dispose();

                        } catch (imgErr) {
                            console.log(`Failed to load image for ${record.PetName}`);
                        }
                    }
                }

                uploadTensor.dispose();
                scanLine.style.display = 'none';
                scanBtn.disabled = false;

                // 3. Evaluate Match (A score > 0.8 is generally a strong structural match)
                if (bestMatchScore > 0.80) {
                    logMsg(`MATCH ACQUIRED: ${matchedPetName} (Confidence: ${(bestMatchScore*100).toFixed(1)}%)`);
                    resultBox.innerHTML = `<div class="match-result vaccinated">VACCINATED <br><small>MATCH: ${matchedPetName}</small></div>`;
                } else {
                    logMsg(`NO MATCH FOUND (Highest Confidence: ${(bestMatchScore*100).toFixed(1)}%)`);
                    resultBox.innerHTML = `<div class="match-result unidentified">UNIDENTIFIED SUBJECT</div>`;
                }

            } catch (error) {
                logMsg(`CRITICAL ERROR: ${error.message}`);
                scanLine.style.display = 'none';
                scanBtn.disabled = false;
            }
        });

        // Start booting when page loads
        window.onload = initSystem;
    </script>
</body>
</html>
