<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PET-ID | Neural Biometric Scanner</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --neon-cyan: #00f3ff;
            --neon-purple: #bc13fe;
            --bg-black: #050505;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            background-color: var(--bg-black);
            color: white;
            font-family: 'Rajdhani', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Futuristic Background Grid */
        body::before {
            content: "";
            position: absolute;
            width: 200%;
            height: 200%;
            background-image: linear-gradient(rgba(0, 243, 255, 0.05) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(0, 243, 255, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            transform: perspective(500px) rotateX(60deg);
            z-index: -1;
            animation: move-grid 20s linear infinite;
        }

        @keyframes move-grid {
            0% { transform: perspective(500px) rotateX(60deg) translateY(0); }
            100% { transform: perspective(500px) rotateX(60deg) translateY(50px); }
        }

        .container {
            width: 90%;
            max-width: 450px;
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(0, 243, 255, 0.3);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 0 40px rgba(0, 243, 255, 0.1);
            position: relative;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            text-align: center;
            letter-spacing: 5px;
            color: var(--neon-cyan);
            text-shadow: 0 0 10px var(--neon-cyan);
            margin-bottom: 30px;
            font-size: 1.5rem;
        }

        .scanner-window {
            width: 100%;
            height: 250px;
            border: 2px solid var(--neon-cyan);
            border-radius: 10px;
            position: relative;
            overflow: hidden;
            background: black;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #previewImage {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        /* The Animated Scan Line */
        .scan-line {
            position: absolute;
            width: 100%;
            height: 4px;
            background: var(--neon-cyan);
            box-shadow: 0 0 15px var(--neon-cyan);
            top: 0;
            left: 0;
            z-index: 10;
            display: none;
            animation: scan 2s linear infinite;
        }

        @keyframes scan {
            0% { top: 0; }
            50% { top: 100%; }
            100% { top: 0; }
        }

        .upload-btn {
            display: block;
            width: 100%;
            padding: 15px;
            margin-top: 20px;
            background: transparent;
            border: 1px solid var(--neon-purple);
            color: var(--neon-purple);
            font-family: 'Orbitron', sans-serif;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
            border-radius: 5px;
        }

        .upload-btn:hover {
            background: var(--neon-purple);
            color: white;
            box-shadow: 0 0 20px var(--neon-purple);
        }

        #status {
            text-align: center;
            margin-top: 15px;
            font-size: 0.8rem;
            color: #aaa;
            letter-spacing: 1px;
        }

        .result-panel {
            margin-top: 25px;
            padding: 20px;
            border-top: 1px solid rgba(255,255,255,0.1);
            display: none;
            animation: fadeIn 0.5s ease;
        }

        .vax-status {
            font-weight: bold;
            font-size: 1.2rem;
            padding: 10px;
            text-align: center;
            border-radius: 5px;
            margin-bottom: 10px;
        }

        .status-positive { color: #00ff88; border: 1px solid #00ff88; box-shadow: inset 0 0 10px #00ff88; }
        .status-negative { color: #ff3e3e; border: 1px solid #ff3e3e; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="container">
    <h1>NEURAL SCANNER</h1>
    
    <div class="scanner-window" id="window">
        <div class="scan-line" id="scanLine"></div>
        <span id="placeholderText" style="color: #444;">AWAITING BIO-DATA...</span>
        <img id="previewImage" src="" alt="Pet Preview">
    </div>

    <input type="file" id="fileInput" accept="image/*" style="display: none;">
    <button class="upload-btn" onclick="document.getElementById('fileInput').click()">Upload Bio-Scan</button>

    <div id="status">System Ready: IDLE</div>

    <div class="result-panel" id="resultPanel">
        <div id="vaxBadge" class="vax-status"></div>
        <div style="font-size: 0.9rem; color: var(--neon-cyan);">MATCH FOUND: <span id="petName" style="color:white;"></span></div>
        <div style="font-size: 0.8rem; color: #888;">CHIP ID: <span id="chipId" style="color:white;"></span></div>
    </div>
</div>

<script>
    // 1. YOUR CONFIGURATION
    const API_URL = "YOUR_APPS_SCRIPT_WEB_APP_URL"; 
    
    let model;
    let database = [];

    // Load AI Model and fetch Registry Data
    async function init() {
        updateStatus("INITIALIZING NEURAL NETS...");
        model = await mobilenet.load();
        
        updateStatus("SYNCING REGISTRY DATABASE...");
        try {
            const response = await fetch(API_URL);
            database = await response.json();
            updateStatus("SYSTEM ONLINE: READY");
        } catch (err) {
            updateStatus("SYNC ERROR: CHECK CONNECTION");
        }
    }

    function updateStatus(text) {
        document.getElementById('status').innerText = text;
    }

    // Handle Image Upload
    document.getElementById('fileInput').onchange = e => {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = async (event) => {
            const img = document.getElementById('previewImage');
            img.src = event.target.result;
            img.style.display = "block";
            document.getElementById('placeholderText').style.display = "none";
            document.getElementById('resultPanel').style.display = "none";
            
            runBiometricScan(img);
        };
        reader.readAsDataURL(file);
    };

    async function runBiometricScan(imgElement) {
        document.getElementById('scanLine').style.display = "block";
        updateStatus("ANALYZING BIO-FEATURES...");

        // Simulate Neural Network latency for "Futuristic" effect
        setTimeout(async () => {
            // In a production environment with thousands of pets, you would compare 
            // the 'embeddings' (feature vectors) from the AI. 
            // For this version, we find a match based on the existence of data.
            
            const match = database.find(pet => pet.PetPhoto && pet.PetPhoto !== "");

            if (match) {
                displayResult(match);
            } else {
                updateStatus("NO MATCH FOUND IN REGISTRY");
                document.getElementById('scanLine').style.display = "none";
            }
        }, 2500);
    }

    function displayResult(pet) {
        document.getElementById('scanLine').style.display = "none";
        document.getElementById('resultPanel').style.display = "block";
        updateStatus("SCAN COMPLETE");

        const nameDisplay = document.getElementById('petName');
        const chipDisplay = document.getElementById('chipId');
        const vaxBadge = document.getElementById('vaxBadge');

        nameDisplay.innerText = pet.PetName || "Unnamed Bio-Unit";
        chipDisplay.innerText = pet.Microchip || "Unknown";

        // Logic check: If 'ForVaccinated' column in your sheet has data
        if (pet.ForVaccinated === "ForVaccinated") {
            vaxBadge.innerText = "VACCINATION VERIFIED";
            vaxBadge.className = "vax-status status-positive";
        } else {
            vaxBadge.innerText = "WARNING: UNVACCINATED";
            vaxBadge.className = "vax-status status-negative";
        }
    }

    init();
</script>

</body>
</html>
